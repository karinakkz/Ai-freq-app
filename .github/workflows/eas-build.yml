name: EAS Build
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install

      - name: Configure EAS project
        working-directory: ./frontend
        run: |
          # Initialize EAS if not already done
          npx eas-cli init --id ai-freqs-app --non-interactive || true

      - name: Build app
        working-directory: ./frontend
        run: |
          if [ "${{ github.event.inputs.platform }}" = "all" ]; then
            npx eas-cli build --platform all --profile production --non-interactive --no-wait
          else
            npx eas-cli build --platform ${{ github.event.inputs.platform }} --profile production --non-interactive --no-wait
          fi
