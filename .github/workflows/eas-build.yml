name: EAS Build
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Configure EAS
        working-directory: ./frontend
        run: |
          # Create .expo directory if it doesn't exist
          mkdir -p .expo
          
          # Write the project config
          echo '{"projectId": "a193de51-04a7-48ad-b19e-fcbbcd325945"}' > .expo/project.json
          
          # Verify the config
          cat .expo/project.json
          cat app.json | grep -A5 "extra"
          
      - name: Build app
        working-directory: ./frontend
        env:
          EXPO_PUBLIC_BACKEND_URL: https://ai-freq-app-production.up.railway.app
          EAS_BUILD_NO_EXPO_GO_WARNING: true
        run: |
          npx eas-cli@latest build --platform ${{ github.event.inputs.platform }} --profile production --non-interactive --no-wait
