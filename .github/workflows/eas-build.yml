name: EAS Build
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Configure EAS Project
        working-directory: ./frontend
        run: |
          # Create the .expo directory
          mkdir -p .expo
          
          # Create project.json with correct format (no extra whitespace)
          echo '{"projectId":"a193de51-04a7-48ad-b19e-fcbbcd325945"}' > .expo/project.json
          
          # Verify the files
          echo "=== .expo/project.json ==="
          cat .expo/project.json
          
          echo ""
          echo "=== eas.json ==="
          cat eas.json
          
          echo ""
          echo "=== Checking app.config.js for projectId ==="
          grep -A3 "projectId" app.config.js || echo "projectId not found in app.config.js"
          
          echo ""
          echo "=== Expo whoami ==="
          npx expo whoami

      - name: Build app
        working-directory: ./frontend
        env:
          EXPO_PUBLIC_BACKEND_URL: https://ai-freq-app-production.up.railway.app
        run: |
          echo "Starting EAS build for platform: ${{ github.event.inputs.platform }}"
          npx eas-cli build --platform ${{ github.event.inputs.platform }} --profile production --non-interactive --no-wait
