name: EAS Build
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Configure EAS Project
        working-directory: ./frontend
        run: |
          npx eas-cli init --id "ai-freqs" --non-interactive || true
          npx eas-cli project:init --non-interactive || true

      - name: Build app
        working-directory: ./frontend
        env:
          EXPO_PUBLIC_BACKEND_URL: https://ai-freq-app-production.up.railway.app
        run: |
          npx eas-cli build --platform ${{ github.event.inputs.platform }} --profile production --non-interactive --no-wait
